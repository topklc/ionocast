name: multiyear-watch

# Bucket 5 watchdogs: items that change on multi-year cycles
# (every 2-15 years).  Each job runs once a year but fires an issue
# only when the watched signal trips, so 4 of 5 years they cost
# nothing.  Cron runs all jobs together for cadence alignment; the
# jobs are independent so one failing does not affect the others.
#
# Watches:
#   - IGRF magnetic-pole coordinates: NOAA NCEI publishes a new IGRF
#     generation every 5 years (IGRF-13 in 2020, IGRF-14 expected
#     late 2025 / early 2026, IGRF-15 in 2030).  Job greps NOAA's
#     IGRF page for any generation higher than the committed
#     baseline; fires issue when detected.  Also fires a
#     time-based reminder when the committed version is older
#     than 6 years (catches the case where parser missed a new
#     generation announcement).
#
#   - ITU-R recommendation revisions: P.533 / P.842 / P.372 are the
#     three recommendations ionocast depends on for HF propagation
#     reliability, noise, and absorption.  ITU updates these on an
#     irregular 7-15 year cycle without an RSS feed; the only
#     reliable signal is a periodic human read of the current
#     versions.  Job fires an unconditional checklist issue when
#     the committed last-verified date is more than 3 years old.
#
#   - Cycle 25 -> 26 transition: F10.7 81-day mean dropping below
#     75 sfu signals solar minimum approach (typical cycle boundary).
#     Job fetches the SWPC F10.7 endpoint, computes recent mean,
#     fires issue when below threshold so the operator can plan a
#     cycle-26 calibration campaign.
#
# Cadence: 04:00 UTC on 25 October.  Same week as the other
# annual reviews (IMO 15th, citations 20th, retune 22nd).
#
# Manual run: workflow_dispatch in the GitHub UI.

on:
  schedule:
    - cron: "0 4 25 10 *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  # ---- IGRF watcher ----
  igrf:
    name: IGRF generation watcher
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      # Update both values when a new IGRF is incorporated into
      # `src/physics/geometry.js`.  COMMITTED_VERSION is the highest
      # IGRF generation we have folded into POLE_LAT / POLE_LON.
      # INCORPORATED_YEAR is the calendar year of that update; the
      # time-based reminder fires when (current year) - this > 6.
      COMMITTED_VERSION: "13"
      INCORPORATED_YEAR: "2020"
    steps:
      - uses: actions/checkout@v4

      - name: Check NOAA NCEI IGRF page for newer generation
        id: detect
        run: |
          set +e
          # NOAA's canonical IGRF landing page.  The latest generation
          # is mentioned prominently in the page text (e.g.
          # "IGRF-14 candidate models").
          curl -sSL --max-time 30 "https://www.ngdc.noaa.gov/IAGA/vmod/igrf.html" -o igrf-page.html
          rc=$?
          echo "fetch_rc=$rc" >> "$GITHUB_OUTPUT"
          # Look for any "IGRF-NN" pattern with NN >= 10 and pick the
          # highest match.  Two-digit minimum avoids matching the
          # legacy "IGRF-1" through "IGRF-9" historical references.
          latest=$(grep -oE 'IGRF-[0-9]{2,}' igrf-page.html 2>/dev/null | grep -oE '[0-9]+' | sort -n | tail -1)
          [ -z "$latest" ] && latest=0
          echo "latest=$latest" >> "$GITHUB_OUTPUT"
          # Time-based reminder: how many years since we last
          # incorporated an IGRF update.
          year=$(date -u +%Y)
          age=$((year - INCORPORATED_YEAR))
          echo "age=$age" >> "$GITHUB_OUTPUT"

      - name: Decide whether to open an issue
        id: decide
        run: |
          latest="${{ steps.detect.outputs.latest }}"
          age="${{ steps.detect.outputs.age }}"
          reason=""
          if [ "${latest:-0}" -gt "${COMMITTED_VERSION:-0}" ]; then
            reason="parser: NOAA page mentions IGRF-$latest (committed: IGRF-$COMMITTED_VERSION)"
          elif [ "${age:-0}" -gt 6 ]; then
            reason="time-based: committed IGRF is $age years old ($INCORPORATED_YEAR); next generation due"
          fi
          if [ -n "$reason" ]; then
            echo "open=1" >> "$GITHUB_OUTPUT"
            echo "reason=$reason" >> "$GITHUB_OUTPUT"
          else
            echo "open=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Open IGRF audit issue
        if: steps.decide.outputs.open == '1'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          today=$(date -u +%Y-%m-%d)
          title="chore(igrf): magnetic-pole coordinates review ${today}"
          {
            echo "Automated IGRF generation watchdog. Source: \`.github/workflows/multiyear-watch.yml\` (job: igrf)."
            echo
            echo "**Trigger:** ${{ steps.decide.outputs.reason }}"
            echo
            echo "**Files to update:**"
            echo "- \`src/physics/geometry.js:49,63\`: POLE_LAT, POLE_LON"
            echo "- \`.github/workflows/multiyear-watch.yml\`: bump \`COMMITTED_VERSION\` and \`INCORPORATED_YEAR\` env vars when a new IGRF is folded in."
            echo
            echo "**Procedure:**"
            echo "1. Download the latest IGRF coefficient file from https://www.ngdc.noaa.gov/IAGA/vmod/igrf.html"
            echo "2. Compute the geomagnetic dipole pole at current epoch (or grab NOAA's published pole position directly)."
            echo "3. Update POLE_LAT / POLE_LON in \`src/physics/geometry.js\`."
            echo "4. Run \`node scripts/tests.mjs physics-unit\` to confirm geomagnetic latitude tests still pass."
            echo "5. Update the workflow env vars to suppress next year's reminder."
            echo
            echo "**Severity (per DRIFT-HORIZON Bucket 5):** degrading. Pole drifts ~50 km/year; ~0.5° per 5 years on a constant the harness can detect but operators can't. Two-line edit when ratified."
          } > issue-body.md
          gh issue create --title "$title" --body-file issue-body.md

  # ---- ITU-R recommendation watcher ----
  itu_r:
    name: ITU-R P-series reminder
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      # Update when the operator confirms (via manual visit to
      # https://www.itu.int/rec/R-REC-P/en) that the committed
      # versions are still current.  After that, the workflow stays
      # silent for 3 years.
      LAST_VERIFIED_DATE: "2026-05-11"
      COMMITTED_P533: "P.533-14"
      COMMITTED_P842: "P.842-5"
      COMMITTED_P372: "P.372-15"
    steps:
      - uses: actions/checkout@v4

      - name: Check verification age
        id: age
        run: |
          set -euo pipefail
          today=$(date -u +%s)
          last=$(date -u -d "$LAST_VERIFIED_DATE" +%s)
          days_old=$(( (today - last) / 86400 ))
          years_old=$(( days_old / 365 ))
          echo "days_old=$days_old"   >> "$GITHUB_OUTPUT"
          echo "years_old=$years_old" >> "$GITHUB_OUTPUT"
          if [ "$years_old" -ge 3 ]; then
            echo "open=1" >> "$GITHUB_OUTPUT"
          else
            echo "open=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Open ITU-R reminder issue
        if: steps.age.outputs.open == '1'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          today=$(date -u +%Y-%m-%d)
          years_old="${{ steps.age.outputs.years_old }}"
          title="chore(itu-r): P-series recommendation review ${today}"
          {
            echo "Automated 3-year ITU-R recommendation review tickler. Source: \`.github/workflows/multiyear-watch.yml\` (job: itu_r)."
            echo
            echo "**Trigger:** last verified ${years_old} years ago. ITU updates P.533 / P.842 / P.372 on an irregular 7-15 year cycle without an RSS feed; this reminder fires every 3 years so a new revision does not slip through."
            echo
            echo "**Manual checks:**"
            echo "- [ ] **ITU-R P.533** at https://www.itu.int/rec/R-REC-P.533/en. Committed version: \`${{ env.COMMITTED_P533 }}\`."
            echo "- [ ] **ITU-R P.842** at https://www.itu.int/rec/R-REC-P.842/en. Committed version: \`${{ env.COMMITTED_P842 }}\`."
            echo "- [ ] **ITU-R P.372** at https://www.itu.int/rec/R-REC-P.372/en. Committed version: \`${{ env.COMMITTED_P372 }}\`."
            echo
            echo "**If a newer version is published:** read the change-bar PDF for any shift in reliability bucket boundaries (P.842), day-to-day SNR spread (P.533), or noise-floor reference values (P.372). Update the affected constants in \`src/constants.js\` (\`BAND_SIGMA_DB\`, \`NOISE_FLOOR_DBM\`) if so. The tier verdicts are sigma-relative so small absolute-value shifts rarely move the verdict columns."
            echo
            echo "**If no newer version (most common case):** update the workflow env var \`LAST_VERIFIED_DATE: \"${today}\"\` to suppress next year's reminder."
            echo
            echo "**Severity (per DRIFT-HORIZON Bucket 5):** degrading, small absolute-value shifts; tier verdicts insensitive to a few dB because they're sigma-relative."
          } > issue-body.md
          gh issue create --title "$title" --body-file issue-body.md

  # ---- Cycle 25 -> 26 transition watcher ----
  cycle_phase:
    name: Solar cycle phase watcher
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      # F10.7 81-day mean threshold for the cycle-minimum signal.
      # Cycle 24 minimum reached F10.7 ~ 70 sfu in 2019; the same
      # threshold catches the cycle 25 -> 26 transition expected
      # around 2030 (could be 2028-2031 depending on cycle length).
      # The threshold is conservative: it fires when we are
      # approaching minimum, not at it, so the cycle-26 retune
      # campaign has lead time.
      F107_MIN_THRESHOLD: "80"
    steps:
      - name: Fetch and analyse F10.7
        id: f107
        run: |
          set -euo pipefail
          # The 6-month endpoint returns the most recent ~120
          # observations; we average the last 81 to mirror SWPC's
          # canonical 81-day-mean (3 Carrington rotations).
          curl -sSL --max-time 30 \
            "https://services.swpc.noaa.gov/json/f107_cm_flux.json" \
            -o f107.json
          mean=$(node -e "
            const fs = require('node:fs');
            const data = JSON.parse(fs.readFileSync('f107.json','utf-8'));
            const flux = data.map(d => parseFloat(d.flux)).filter(x => x > 0 && x < 400);
            // Sort by time descending (the endpoint returns mixed
            // order); take the most recent 81 distinct days.
            const byTime = data.slice().sort((a, b) =>
              (new Date(b.time_tag)) - (new Date(a.time_tag))
            );
            const seenDays = new Set();
            const recent = [];
            for (const row of byTime) {
              const day = row.time_tag.slice(0, 10);
              if (seenDays.has(day)) continue;
              const f = parseFloat(row.flux);
              if (!(f > 0 && f < 400)) continue;
              seenDays.add(day);
              recent.push(f);
              if (recent.length >= 81) break;
            }
            const mean = recent.reduce((a, b) => a + b, 0) / recent.length;
            console.log(mean.toFixed(1));
          ")
          echo "mean=$mean" >> "$GITHUB_OUTPUT"
          echo "F10.7 81-day mean: $mean sfu  (threshold: $F107_MIN_THRESHOLD sfu)"

      - name: Decide whether to open an issue
        id: decide
        run: |
          mean="${{ steps.f107.outputs.mean }}"
          th="${F107_MIN_THRESHOLD:-80}"
          # bash arithmetic is integer-only; multiply by 10 to keep
          # one decimal of precision when comparing.
          mean_int=$(echo "$mean" | awk '{printf "%.0f", $1 * 10}')
          th_int=$(( th * 10 ))
          if [ "$mean_int" -lt "$th_int" ]; then
            echo "open=1" >> "$GITHUB_OUTPUT"
          else
            echo "open=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Open cycle-phase issue
        if: steps.decide.outputs.open == '1'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          today=$(date -u +%Y-%m-%d)
          mean="${{ steps.f107.outputs.mean }}"
          title="chore(cycle): F10.7 below cycle-minimum threshold (${mean} sfu) ${today}"
          {
            echo "Automated solar cycle phase watchdog. Source: \`.github/workflows/multiyear-watch.yml\` (job: cycle_phase)."
            echo
            echo "**Trigger:** F10.7 81-day mean is ${mean} sfu, below the ${F107_MIN_THRESHOLD} sfu cycle-minimum threshold. Cycle 25 minimum approaching (or cycle 26 has started)."
            echo
            echo "**What this means:** the whole calibration suite (storm-lag, EIA, sigma tables, scatter weight) was fitted on cycle-25 ascending/peak data. Cycle 26 ascending phase has different storm response, different EIA amplitude scaling, different upper-band activity. The annual \`retune-annual.yml\` workflow continues to run but its recommendations should be weighted heavily during the transition window."
            echo
            echo "**Recommended actions:**"
            echo "1. Plan a multi-month retune campaign with fresh basket data through the minimum and into cycle 26 ascending phase."
            echo "2. Watch the weekly \`tests-weekly.yml\` \`tune-r7-scan\` output more carefully than usual; suggestions during a cycle transition are more meaningful than mid-cycle drift."
            echo "3. Capture operator-side observations: do bands behave as the model predicts during the minimum? Where does it under- / over-predict?"
            echo "4. Consider an interim retune commit if multi-month operator experience supports it. Do not auto-commit."
            echo
            echo "**Severity (per DRIFT-HORIZON Bucket 5-6):** degrading. ionocast keeps working; accuracy drifts measurably for ~2 years until retuned. The annual retune workflow catches incremental drift but not the structural change from cycle phase."
          } > issue-body.md
          gh issue create --title "$title" --body-file issue-body.md
